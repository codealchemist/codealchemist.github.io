<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="Alberto Miranda" />
    <meta name="theme-color" content="#000000" />
    <meta name="robots" content="index,follow" />
    <meta
      name="description"
      content="Personal website of Alberto Miranda, a software developer focused on web experiences."
    />
    <link rel="canonical" href="https://albertomiranda.com.ar/" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />

    <meta property="og:title" content="Alberto Miranda" />
    <meta property="og:site_name" content="Alberto Miranda" />
    <meta
      property="og:description"
      content="Software developer focused on web. Building thoughtful and practical digital experiences."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://albertomiranda.com.ar" />
    <meta
      property="og:image"
      content="https://albertomiranda.com.ar/bert.jpg"
    />
    <meta property="og:locale" content="en_US" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@albertomiranda" />
    <meta name="twitter:creator" content="@albertomiranda" />
    <meta name="twitter:title" content="Alberto Miranda" />
    <meta
      name="twitter:description"
      content="Software developer focused on web."
    />
    <meta
      name="twitter:image"
      content="https://albertomiranda.com.ar/bert.jpg"
    />
    <title>Alberto Miranda | Software Developer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <button
      id="theme-toggle"
      class="theme-toggle"
      type="button"
      aria-label="Switch to light theme"
      aria-pressed="false"
    >
      <span class="theme-toggle-label">Light theme</span>
    </button>

    <div class="smoke smoke-a" aria-hidden="true"></div>
    <div class="smoke smoke-b" aria-hidden="true"></div>

    <main class="viewport" aria-label="Interactive profile cube">
      <canvas id="scene" aria-label="3D interactive cube"></canvas>
    </main>

    <div
      id="help-text-mobile"
      class="help-overlay help-mobile"
      aria-label="Cube rotation instructions"
    >
      <p>Drag to rotate</p>
    </div>

    <div
      id="help-text-desktop"
      class="help-overlay help-desktop"
      aria-label="Cube rotation instructions"
    >
      <p>Drag to rotate • Arrow keys to snap faces</p>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
